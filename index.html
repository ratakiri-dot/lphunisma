
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LPH UNISMA - Management Information System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #E0E5EC;
      color: #31456A;
      margin: 0;
      overflow-x: hidden;
    }

    /* Neumorphism Utilities */
    .neu-flat {
      background: #E0E5EC;
      box-shadow: 9px 9px 16px rgb(163, 177, 198, 0.6), -9px -9px 16px rgba(255, 255, 255, 0.5);
    }
    .neu-inset {
      background: #E0E5EC;
      box-shadow: inset 6px 6px 12px #b8bec5, inset -6px -6px 12px #ffffff;
    }
    .neu-button {
      background: #E0E5EC;
      box-shadow: 6px 6px 12px #b8bec5, -6px -6px 12px #ffffff;
      transition: all 0.2s ease;
    }
    .neu-button:active {
      box-shadow: inset 4px 4px 8px #b8bec5, inset -4px -4px 8px #ffffff;
    }

    /* Anti-Screenshot Overlay for Public Mode */
    .anti-screenshot-overlay {
      pointer-events: none;
      user-select: none;
      background: repeating-linear-gradient(45deg, rgba(0,0,0,0.02) 0px, rgba(0,0,0,0.02) 20px, transparent 20px, transparent 40px);
    }
    
    @media print {
      /* Global Reset for Print */
      * { 
        background: transparent !important; 
        background-color: transparent !important; 
        color: black !important; 
        box-shadow: none !important; 
        text-shadow: none !important;
        filter: none !important;
        -webkit-filter: none !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }
      
      html, body { 
        background: white !important; 
        background-color: white !important; 
        width: 100% !important;
        height: auto !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      /* Hide All UI Except Table */
      .no-print, header, aside, footer, .anti-screenshot-overlay, .neu-button, button, .shrink-0 { 
        display: none !important; 
      }
      
      /* Ensure Main and Section have no backgrounds */
      main, section, div, #root {
        background: transparent !important;
        background-color: transparent !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      /* Maximum Table Clarity */
      table { 
        border-collapse: collapse !important; 
        width: 100% !important; 
        margin: 0 !important;
        table-layout: auto !important;
        background-color: white !important;
      }
      
      th, td { 
        border: 1px solid #000 !important; 
        padding: 8px 12px !important;
        color: black !important;
        background: white !important;
        font-size: 10pt !important;
      }

      th { 
        background-color: #f2f2f2 !important; 
        font-weight: bold !important;
        text-transform: uppercase !important;
      }

      /* Force background printing for headers */
      th { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

      /* Remove all padding/margins from wrappers */
      .max-w-7xl { max-width: 100% !important; width: 100% !important; }
      .p-4, .p-6, .p-8, .md\:p-6, .lg\:p-8 { padding: 0 !important; }
      .space-y-8 > * + * { margin-top: 0 !important; }
    }

    /* Markdown Specific Styles */
    .prose-custom ul { list-style-type: disc; padding-left: 1.25rem; margin-top: 0.5rem; margin-bottom: 0.5rem; }
    .prose-custom li { margin-bottom: 0.25rem; }
    .prose-custom table { width: 100%; border-collapse: collapse; margin-top: 0.75rem; font-size: 0.75rem; }
    .prose-custom th, .prose-custom td { padding: 0.5rem; border: 1px solid rgba(0,0,0,0.1); text-align: left; }
    .prose-custom th { background: rgba(0,0,0,0.05); font-weight: 800; }

    /* Custom Scrollbar */
    .custom-scrollbar::-webkit-scrollbar {
      height: 10px;
      width: 8px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #b8bec5;
      border-radius: 10px;
      border: 2px solid #E0E5EC;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #31456A;
    }
  </style>

}
